name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: applipplikey
          package: .

      - name: Notify deploy success
        if: success()
        run: |
          echo "✅ デプロイ完了"
          echo "   URL: https://key.applippli.co.jp/"
          echo "   コミット: ${{ github.sha }}"
          echo "   実行者: ${{ github.actor }}"
          echo "   時刻: $(date '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify deploy failure
        if: failure()
        run: |
          echo "❌ デプロイ失敗"
          echo "   コミット: ${{ github.sha }}"
          echo "   実行者: ${{ github.actor }}"
          echo "   ログ: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
