<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#08182f}
  .bn{width:1080px;height:1080px;background:#0b1f3a;border:10px solid #e5b53a;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;font-family:'Noto Sans JP',sans-serif;position:relative;overflow:hidden}
  .brand{display:flex;flex-direction:column;align-items:center;gap:22px;margin-bottom:56px}
  .brand img{width:150px;height:150px;display:block}
  .brand .name{color:#fff;font-size:52px;font-weight:500;letter-spacing:1px}
  .brand .name b{color:#e5b53a;font-weight:700}
  .brand .ss{color:#8ba0bd;font-size:24px;letter-spacing:3px;margin-top:-8px}
  .catch{color:#fff;font-size:78px;font-weight:900;line-height:1.35}
  .catch .g{color:#e5b53a}
  .sub{color:#cbd6e6;font-size:30px;font-weight:500;margin-top:40px;line-height:1.7;padding:0 60px}
  .pill{margin-top:46px;background:#e5b53a;color:#0b1f3a;font-size:28px;font-weight:700;
        padding:14px 40px;border-radius:40px}
</style></head>
<body>
  <div class="bn" id="bn">
    <div style="color:#e5b53a;font-size:26px;font-weight:700;letter-spacing:8px;margin-bottom:34px">MFA SECURED</div>
    <div class="brand">
      <img src="../img/key-logo.png" alt="">
      <span class="name">applippli-<b>key</b></span>
      <span class="ss">Security Suite</span>
    </div>
    <div class="catch">スマホワンタッチで<br><span class="g">Windows</span>ログイン</div>
    <div class="sub">2段階認証（MFA）・ログ・脅威発見<br>自動IPブロック・LINE通知</div>
    <div class="pill">国産次世代認証セキュリティ</div>
  </div>
</body></html>
