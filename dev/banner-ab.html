<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#08182f}
  .bn{width:1200px;height:630px;background:#0b1f3a;font-family:'Noto Sans JP',sans-serif;
      padding:26px;display:flex;overflow:hidden}
  .frame{width:100%;height:100%;border:4px solid #e5b53a;border-radius:14px;display:flex;overflow:hidden}
  .left{flex:1;padding:0 46px;display:flex;flex-direction:column;justify-content:center}
  .secured{color:#e5b53a;font-size:18px;font-weight:700;letter-spacing:6px;margin-bottom:18px}
  .catch{color:#fff;font-size:50px;font-weight:900;line-height:1.3}
  .catch .g{color:#e5b53a}
  .sub{color:#cbd6e6;font-size:20px;font-weight:500;margin-top:22px;line-height:1.6}
  .pill{align-self:flex-start;margin-top:26px;background:#e5b53a;color:#0b1f3a;font-size:18px;
        font-weight:700;padding:9px 24px;border-radius:28px}
  .right{width:37%;background:#12294a;display:flex;flex-direction:column;align-items:center;
         justify-content:center;border-left:1px solid #23405f}
  .right img{width:150px;height:150px;display:block;margin-bottom:20px}
  .right .name{color:#fff;font-size:32px;font-weight:700}
  .right .name b{color:#e5b53a}
  .right .ss{color:#8ba0bd;font-size:16px;letter-spacing:3px;margin-top:6px}
</style></head>
<body>
  <div class="bn">
    <div class="frame">
      <div class="left">
        <div class="secured">MFA SECURED</div>
        <div class="catch">スマホワンタッチで<br><span class="g">Windows</span>ログイン</div>
        <div class="sub">2段階認証（MFA）・ログ・脅威発見<br>自動IPブロック・LINE通知</div>
        <div class="pill">国産次世代認証セキュリティ</div>
      </div>
      <div class="right">
        <img src="../img/key-logo.png" alt="">
        <div class="name">applippli-<b>key</b></div>
        <div class="ss">Security Suite</div>
      </div>
    </div>
  </div>
</body></html>
