<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#08182f}
  .bn{width:1200px;height:630px;background:#0b1f3a;font-family:'Noto Sans JP',sans-serif;
      padding:26px;position:relative;overflow:hidden}
  .frame{width:100%;height:100%;border:4px solid #e5b53a;border-radius:14px;
         display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .secured{color:#e5b53a;font-size:19px;font-weight:700;letter-spacing:6px;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .brand img{width:58px;height:58px;display:block}
  .brand .txt{display:flex;flex-direction:column;align-items:flex-start;line-height:1.1}
  .brand .name{color:#fff;font-size:30px;font-weight:500;letter-spacing:1px}
  .brand .name b{color:#e5b53a;font-weight:700}
  .brand .ss{color:#8ba0bd;font-size:15px;letter-spacing:2px;margin-top:3px}
  .catch{color:#fff;font-size:60px;font-weight:900;line-height:1.28}
  .catch .g{color:#e5b53a}
  .sub{color:#cbd6e6;font-size:24px;font-weight:500;margin-top:24px}
  .pill{margin-top:26px;background:#e5b53a;color:#0b1f3a;font-size:20px;font-weight:700;
        padding:10px 28px;border-radius:30px}
</style></head>
<body>
  <div class="bn">
    <div class="frame">
      <div class="secured">MFA SECURED</div>
      <div class="brand">
        <img src="../img/key-logo.png" alt="">
        <span class="txt">
          <span class="name">applippli-<b>key</b></span>
          <span class="ss">Security Suite</span>
        </span>
      </div>
      <div class="catch">スマホワンタッチで<br><span class="g">Windows</span>ログイン</div>
      <div class="sub">2段階認証（MFA）・ログ・脅威発見・自動IPブロック・LINE通知</div>
      <div class="pill">国産次世代認証セキュリティ</div>
    </div>
  </div>
</body></html>
